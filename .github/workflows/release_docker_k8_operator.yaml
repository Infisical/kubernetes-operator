name: Release K8 Operator Docker Image
on:
    push:
        tags:
            - "infisical-k8-operator/v*.*.*"

permissions:
    contents: write
    pull-requests: write

jobs:
    release-image:
        name: Generate Helm Chart PR
        runs-on: ubuntu-latest
        outputs:
            pr_number: ${{ steps.create-pr.outputs.pull-request-number }}
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "::set-output name=version::${GITHUB_REF_NAME#infisical-k8-operator/}"

            - name: Checkout code
              uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0 Mar 24, 2023

            # Dependency for helm generation
            - name: Install Helm
              uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5 Dec 12, 2022
              with:
                  version: v3.10.0

            # Dependency for helm generation
            - name: Install Go
              uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0 Dec 15, 2015
              with:
                  go-version: 1.21

            # Install binaries for helm generation
            - name: Install dependencies
              run: |
                  make helmify
                  make kustomize
                  make controller-gen

            - name: Generate Helm Chart
              run: make helm VERSION=${{ steps.extract_version.outputs.version }}

            - name: Debug - Check file changes
              run: |
                  echo "Current git status:"
                  git status
                  echo ""
                  echo "Modified files:"
                  git diff --name-only

                  # If there is no diff, exit with error. Version should always be changed, so if there is no diff, something is wrong and we should exit.
                  if [ -z "$(git diff --name-only)" ]; then
                    echo "No helm changes or version changes. Invalid release detected, Exiting."
                    exit 1
                  fi

            - name: Create Helm Chart PR
              id: create-pr
              uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5.0.3 Mar 20, 2024
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: "Update Helm chart to version ${{ steps.extract_version.outputs.version }}"
                  committer: GitHub <noreply@github.com>
                  author: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
                  branch: helm-update-${{ steps.extract_version.outputs.version }}
                  delete-branch: true
                  title: "Update Helm chart to version ${{ steps.extract_version.outputs.version }}"
                  body: |
                      This PR updates the Helm chart to version `${{ steps.extract_version.outputs.version }}`.
                      Additionally the helm chart has been updated to match the latest operator code changes.

                      Associated Release Workflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

                      Once you have approved this PR, you can trigger the helm release workflow manually.
                  base: main

            - name: 🔧 Set up QEMU
              uses: docker/setup-qemu-action@27d0a4f181a40b142cce983c5393082c365d1480 # v1.2.0 May 26, 2022

            - name: 🔧 Set up Docker Buildx
              uses: docker/setup-buildx-action@f211e3e9ded2d9377c8cadc4489a4e38014bc4c9 # v1.7.0 Apr 28, 2022

            - name: 🐋 Login to Docker Hub
              uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1.14.1 Mar 1, 2022
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              id: docker_build
              uses: docker/build-push-action@ac9327eae2b366085ac7f6a2d02df8aa8ead720a # v2.10.0 Mar 14, 2022
              with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      infisical/kubernetes-operator:latest
                      infisical/kubernetes-operator:${{ steps.extract_version.outputs.version }}
