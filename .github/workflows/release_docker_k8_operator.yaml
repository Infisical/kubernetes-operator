name: Release K8 Operator Docker Image and Helm Chart
on:
    push:
        tags:
            - "infisical-k8-operator/v*.*.*"

permissions:
    contents: read

jobs:
    release-docker:
        name: Release Docker Image
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.extract_version.outputs.version }}
        steps:
            - name: Extract version from tag
              id: extract_version
              run: echo "version=${GITHUB_REF_NAME#infisical-k8-operator/}" >> "$GITHUB_OUTPUT"

            - name: Checkout code
              uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0 Mar 24, 2023

            - name: Verify chart version matches tag
              run: |
                  CHART_VERSION=$(grep '^version:' helm-charts/secrets-operator/Chart.yaml | awk '{print $2}' | tr -d '"')
                  TAG_VERSION="${{ steps.extract_version.outputs.version }}"
                  if [ "$CHART_VERSION" != "$TAG_VERSION" ]; then
                    echo "Chart version ($CHART_VERSION) does not match tag version ($TAG_VERSION)."
                    echo "Update helm-charts/secrets-operator/Chart.yaml on main before tagging the release."
                    exit 1
                  fi
                  echo "Chart version matches tag: $TAG_VERSION"

            - name: Set up QEMU
              uses: docker/setup-qemu-action@27d0a4f181a40b142cce983c5393082c365d1480 # v1.2.0 May 26, 2022

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@f211e3e9ded2d9377c8cadc4489a4e38014bc4c9 # v1.7.0 Apr 28, 2022

            - name: Login to Docker Hub
              uses: docker/login-action@dd4fa0671be5250ee6f50aedf4cb05514abda2c7 # v1.14.1 Mar 1, 2022
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Build and push
              id: docker_build
              uses: docker/build-push-action@ac9327eae2b366085ac7f6a2d02df8aa8ead720a # v2.10.0 Mar 14, 2022
              with:
                  context: .
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: |
                      infisical/kubernetes-operator:latest
                      infisical/kubernetes-operator:${{ steps.extract_version.outputs.version }}

    test-helm:
        name: Test Helm Chart
        needs: release-docker
        uses: ./.github/workflows/run-helm-chart-tests-secret-operator.yml

    release-helm:
        name: Release Helm Chart
        needs: test-helm
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0 Mar 24, 2023

            - name: Install Helm
              uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3.5 Dec 12, 2022
              with:
                  version: v3.10.0

            - name: Build and push helm package to CloudSmith
              run: cd helm-charts && sh upload-k8s-operator-cloudsmith.sh
              env:
                  CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
                  CLOUDSMITH_USERNAME: ${{ secrets.CLOUDSMITH_USERNAME }}
