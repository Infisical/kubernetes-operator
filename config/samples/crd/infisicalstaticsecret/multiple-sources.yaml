apiVersion: secrets.infisical.com/v1beta1
kind: InfisicalStaticSecret
metadata:
  name: infisicalstaticsecret-multi-demo
spec:
  infisicalAuthRef:
    name: infisicalauth-kubernetes-demo
    namespace: default

  syncOptions:
    refreshInterval: 60s
    instantUpdates: false

  sources:
    - projectId: <your-project-id>
      environmentSlug: dev
      secretPath: /app
    - projectId: <your-project-id>
      environmentSlug: dev
      secretPath: /shared
      recursive: true
      tagSlugs:
        - backend

  targets:
    - name: app-secrets
      namespace: default
      kind: Secret
      creationPolicy: Owner
    - name: app-config
      namespace: default
      kind: ConfigMap
      creationPolicy: Orphan
      metadata:
        labels:
          app: my-app
        annotations:
          description: "Synced from Infisical"
